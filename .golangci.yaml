version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: standard
  # Complexity linters whose thresholds are configured below. Without this
  # enable list they never run under golangci-lint v2's default: standard (#77).
  enable:
    - cyclop
    - funlen
    - gocognit
  settings:
    cyclop:
      max-complexity: 30
    funlen:
      lines: 200
      statements: 100
    gocognit:
      min-complexity: 60
    exhaustive:
      default-signifies-exhaustive: true

formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/mpyw/gormreuse)
      custom-order: true
